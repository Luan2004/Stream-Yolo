<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Test Camera Điện Thoại YOLO Realtime</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    video,
    img,
    canvas {
      width: 100%;
      border-radius: 12px;
      background: black;
      border: 1px solid #334155;
    }

    .card {
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #1f2937;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button.stop {
      background: #dc2626;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      background: #020617;
      border-radius: 8px;
      color: #cbd5e1;
      white-space: pre-wrap;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>YOLO Realtime bằng Camera Điện Thoại</h1>

    <div class="card">
      <label>API URL</label>
      <input
        id="apiUrl"
        value="http://127.0.0.1:8000/detect/image-motion"
      />

      <label>Confidence</label>
      <input
        id="conf"
        type="number"
        value="0.4"
        min="0"
        max="1"
        step="0.05"
      />

      <label>Khoảng delay giữa các frame, ms</label>
      <input
        id="delayMs"
        type="number"
        value="300"
        min="100"
        step="100"
      />

      <label>Ngưỡng chuyển động phía trình duyệt, %</label>
      <input
        id="clientMotionThreshold"
        type="number"
        value="2.0"
        min="0"
        max="100"
        step="0.5"
      />

      <label>Ngưỡng chuyển động phía backend, %</label>
      <input
        id="serverMotionThreshold"
        type="number"
        value="3.0"
        min="0"
        max="100"
        step="0.5"
      />

      <label>Ép detect lại sau, giây</label>
      <input
        id="forceInterval"
        type="number"
        value="1.0"
        min="0.2"
        step="0.2"
      />

      <button type="button" onclick="startCamera()">Bắt đầu camera</button>
      <button type="button" class="stop" onclick="stopCamera()">Dừng</button>

      <div id="status" class="status">Chưa chạy.</div>
    </div>

    <br />

    <div class="grid">
      <div class="card">
        <h3>Camera gốc</h3>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
      </div>

      <div class="card">
        <h3>Kết quả detect</h3>
        <img id="resultImg" />
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const resultImg = document.getElementById("resultImg");
    const statusBox = document.getElementById("status");

    let stream = null;
    let running = false;
    let processing = false;
    let lastResultUrl = null;
    let lastClientGray = null;
    let lastSentAt = 0;
    let skippedClientFrames = 0;
    let sentFrames = 0;

    async function startCamera() {
      try {
        if (running) return;

        running = true;
        skippedClientFrames = 0;
        sentFrames = 0;
        lastClientGray = null;
        lastSentAt = 0;

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment"
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();

        statusBox.textContent = "Đã mở camera. Đang gửi frame vào API...";

        setTimeout(processLoop, 800);

      } catch (err) {
        running = false;
        statusBox.textContent =
          "Không mở được camera.\n\n" +
          err.message + "\n\n" +
          "Lưu ý:\n" +
          "- Trên máy tính: nên mở HTML bằng http://localhost hoặc http://127.0.0.1.\n" +
          "- Trên điện thoại: thường cần HTTPS hoặc phải cấp quyền camera.\n" +
          "- Nếu dùng điện thoại gọi API máy tính, không dùng 127.0.0.1, hãy dùng IP máy tính.";
      }
    }

    function stopCamera() {
      running = false;
      processing = false;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      statusBox.textContent = "Đã dừng camera.";
    }

    function getSmallGrayFromCanvas(sourceCanvas, targetWidth = 160) {
      const scale = targetWidth / sourceCanvas.width;
      const targetHeight = Math.max(1, Math.round(sourceCanvas.height * scale));

      const small = document.createElement("canvas");
      small.width = targetWidth;
      small.height = targetHeight;

      const sctx = small.getContext("2d", { willReadFrequently: true });
      sctx.drawImage(sourceCanvas, 0, 0, targetWidth, targetHeight);

      const img = sctx.getImageData(0, 0, targetWidth, targetHeight).data;
      const gray = new Uint8Array(targetWidth * targetHeight);

      for (let i = 0, j = 0; i < img.length; i += 4, j++) {
        gray[j] = (img[i] * 0.299 + img[i + 1] * 0.587 + img[i + 2] * 0.114) | 0;
      }

      return {
        gray,
        width: targetWidth,
        height: targetHeight
      };
    }

    function calcMotionPercent(prev, curr, diffThreshold = 25) {
      if (!prev || !curr || prev.gray.length !== curr.gray.length) {
        return 100;
      }

      let changed = 0;
      const total = curr.gray.length;

      for (let i = 0; i < total; i++) {
        if (Math.abs(curr.gray[i] - prev.gray[i]) > diffThreshold) {
          changed++;
        }
      }

      return (changed / total) * 100;
    }

    async function processLoop() {
      if (!running || processing) return;

      const apiUrl = document.getElementById("apiUrl").value.trim();
      const conf = document.getElementById("conf").value;
      const delayMs = parseInt(document.getElementById("delayMs").value || "300");
      const clientMotionThreshold = parseFloat(document.getElementById("clientMotionThreshold").value || "2.0");
      const serverMotionThreshold = parseFloat(document.getElementById("serverMotionThreshold").value || "3.0");
      const forceInterval = parseFloat(document.getElementById("forceInterval").value || "1.0");

      try {
        if (video.videoWidth === 0 || video.videoHeight === 0) {
          setTimeout(processLoop, delayMs);
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const currGray = getSmallGrayFromCanvas(canvas);
        const motionPercent = calcMotionPercent(lastClientGray, currGray);
        const now = Date.now();
        const forceSend = (now - lastSentAt) >= forceInterval * 1000;

        lastClientGray = currGray;

        if (motionPercent < clientMotionThreshold && !forceSend) {
          skippedClientFrames++;

          statusBox.textContent =
            "Bỏ qua frame vì ít chuyển động ở frontend.\n" +
            "Motion frontend: " + motionPercent.toFixed(2) + "%\n" +
            "Đã gửi: " + sentFrames + " frame\n" +
            "Bỏ qua frontend: " + skippedClientFrames + " frame";

          setTimeout(processLoop, delayMs);
          return;
        }

        processing = true;

        canvas.toBlob(async function(blob) {
          try {
            if (!blob || !running) {
              processing = false;
              setTimeout(processLoop, delayMs);
              return;
            }

            const formData = new FormData();
            formData.append("file", blob, "camera_frame.jpg");
            formData.append("conf", conf);
            formData.append("motion_threshold", serverMotionThreshold);
            formData.append("force_interval", forceInterval);

            const response = await fetch(apiUrl, {
              method: "POST",
              body: formData
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(text);
            }

            const skippedByServer = response.headers.get("X-Skipped-By-Motion");
            const serverMotionScore = response.headers.get("X-Motion-Score");

            const resultBlob = await response.blob();

            if (lastResultUrl) {
              URL.revokeObjectURL(lastResultUrl);
            }

            lastResultUrl = URL.createObjectURL(resultBlob);
            resultImg.src = lastResultUrl;

            sentFrames++;
            lastSentAt = Date.now();

            statusBox.textContent =
              "Đang chạy realtime có kiểm tra chuyển động.\n" +
              "Confidence: " + conf + "\n" +
              "Delay: " + delayMs + " ms\n" +
              "Motion frontend: " + motionPercent.toFixed(2) + "%\n" +
              "Motion backend: " + serverMotionScore + "%\n" +
              "Backend skip YOLO: " + skippedByServer + "\n" +
              "Đã gửi: " + sentFrames + " frame\n" +
              "Bỏ qua frontend: " + skippedClientFrames + " frame";

          } catch (err) {
            statusBox.textContent =
              "Lỗi khi gọi API:\n\n" +
              err.message;
          } finally {
            processing = false;
            if (running) {
              setTimeout(processLoop, delayMs);
            }
          }
        }, "image/jpeg", 0.8);

      } catch (err) {
        processing = false;

        statusBox.textContent =
          "Lỗi khi xử lý camera:\n\n" +
          err.message;

        setTimeout(processLoop, delayMs);
      }
    }
  </script>
</body>
</html>
